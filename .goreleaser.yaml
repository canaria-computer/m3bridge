# yaml-language-server: $schema=https://goreleaser.com/static/schema.json
# vim: set ts=2 sw=2 tw=0 fo=cnqoj

version: 2

before:
  hooks:
    - go mod tidy
    - go generate ./...

builds:
  - env:
      - CGO_ENABLED=0
    goos:
      - windows
      - darwin
      - linux
    goarch:
      - amd64

archives:
  - formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}x86_64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: [zip]

dockers:
  - image_templates:
      - "ghcr.io/canaria-computer/m3bridge:{{ .Tag }}"
      - "ghcr.io/canaria-computer/m3bridge:latest"
    # GoReleaser のビルドコンテキストはソースではなく dist/ 内のバイナリのみ
    # Dockerfile.goreleaser はビルド済みバイナリをコピーするだけのランタイム専用
    dockerfile: Dockerfile.goreleaser
    use: buildx
    # linux/amd64 バイナリを明示的にコンテキストへ含める
    extra_files:
      - Dockerfile.goreleaser
    ids:
      - m3bridge
    build_flag_templates:
      - "--platform=linux/amd64"
      - "--label=org.opencontainers.image.title=m3bridge"
      - "--label=org.opencontainers.image.description=Local SMTP server that sends mail via Microsoft Graph API"
      - "--label=org.opencontainers.image.url=https://github.com/canaria-computer/m3bridge"
      - "--label=org.opencontainers.image.source=https://github.com/canaria-computer/m3bridge"
      - "--label=org.opencontainers.image.version={{ .Version }}"
      - "--label=org.opencontainers.image.revision={{ .FullCommit }}"

scoops:
  - name: m3bridge
    repository:
      owner: canaria-computer
      name: scoop-bucket
    homepage: https://github.com/canaria-computer/m3bridge
    license: "MIT LICENSE"

nfpms:
  - file_name_template: "{{ .ConventionalFileName }}"
    maintainer: "canaria-collection <121685177+canaria-computer@users.noreply.github.com>"
    license: "MIT"
    formats: [deb, rpm, apk]

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"

release:
  footer: >-

    ---

    Released by [GoReleaser](https://github.com/goreleaser/goreleaser).
